name: Frontend CI/CD

on:
  push:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Create deployment bundle
        run: tar -czf /tmp/frontend-release.tgz --exclude=node_modules --exclude=.next --exclude=.git .

      - name: Upload deployment bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-release
          path: /tmp/frontend-release.tgz

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download deployment bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-release
          path: .

      - name: Upload bundle to VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: ${{ secrets.GCP_VM_PORT || '22' }}
          source: "frontend-release.tgz"
          target: "/tmp"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1
        env:
          FRONTEND_ENV_FILE: ${{ secrets.FRONTEND_ENV_FILE }}
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: ${{ secrets.GCP_VM_PORT || '22' }}
          envs: FRONTEND_ENV_FILE
          script: |
            set -euo pipefail

            APP_DIR="/opt/docuhub-frontend"
            NET_NAME="docuhub"
            sudo mkdir -p "$APP_DIR"
            sudo chown -R "$USER":"$USER" "$APP_DIR"
            tar -xzf /tmp/frontend-release.tgz -C "$APP_DIR"
            cd "$APP_DIR"

            printf "%s" "$FRONTEND_ENV_FILE" > .env
            sudo docker network inspect "$NET_NAME" >/dev/null 2>&1 || sudo docker network create "$NET_NAME"

            sudo docker build -t docuhub-frontend:latest .
            sudo docker rm -f docuhub-frontend >/dev/null 2>&1 || true
            sudo docker run -d \
              --name docuhub-frontend \
              --restart unless-stopped \
              --network "$NET_NAME" \
              --env-file .env \
              -p 127.0.0.1:3100:3100 \
              docuhub-frontend:latest
